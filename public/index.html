<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Atendimento ao Cidadão</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f3d75;
      font-size: 34px;
    }

    h2 {
      color: #114b8b;
      margin-top: 36px;
      margin-bottom: 20px;
      font-size: 24px;
    }

    p.subtitulo {
      margin-top: -8px;
      margin-bottom: 28px;
      color: #4b5563;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 20px;
    }

    .campo {
      display: flex;
      flex-direction: column;
    }

    .campo-full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #1f2937;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .acoes {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      background: #0f62fe;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background: #0b4fd1;
    }

    .secao {
      margin-top: 18px;
      padding-top: 10px;
    }

    .resultado {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
    }

    .sucesso {
      background: #ecfdf3;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .erro {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 40px 0 20px;
    }

    @media (max-width: 700px) {
      .container {
        margin: 20px;
        padding: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Portal de Atendimento ao Cidadão</h1>
    <p class="subtitulo">
      Registre sua solicitação de serviços municipais e acompanhe o andamento pelo número do protocolo.
    </p>

    <h2>Registrar Solicitação</h2>

    <form id="formSolicitacao">
      <div class="grid">
        <div class="campo">
          <label for="intencao">Tipo de solicitação</label>
          <select id="intencao" required>
            <option value="">Selecione uma opção</option>
            <option value="poda_de_arvore">Poda de árvore</option>
            <option value="coleta_de_lixo">Coleta de lixo</option>
            <option value="tapa_buraco">Tapa-buraco</option>
            <option value="iluminacao_publica">Iluminação pública</option>
            <option value="entulho_em_via_publica">Entulho em via pública</option>
            <option value="esgoto">Esgoto</option>
            <option value="posto_de_saude">Posto de saúde</option>
            <option value="guarda_municipal">Guarda municipal</option>
            <option value="transporte_publico_municipal">Transporte público municipal</option>
            <option value="outros">Outros</option>
          </select>
        </div>

        <div class="campo">
          <label for="nome">Nome do cidadão</label>
          <input type="text" id="nome" required />
        </div>

        <div class="campo">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(81) 99999-9999" />
        </div>

        <div class="campo">
          <label for="chatId">Chat ID / WhatsApp</label>
          <input type="text" id="chatId" placeholder="Número do WhatsApp" />
        </div>

        <div class="campo campo-full">
          <label for="endereco">Endereço do serviço</label>
          <input type="text" id="endereco" required />
        </div>

        <div class="campo campo-full">
          <label for="pontoReferencia">Ponto de referência</label>
          <input type="text" id="pontoReferencia" />
        </div>

        <div class="campo campo-full">
          <label for="descricao">Descrição do problema</label>
          <textarea id="descricao" required></textarea>
        </div>

        <div class="campo campo-full">
          <label for="opiniao">Observação complementar do cidadão</label>
          <textarea id="opiniao"></textarea>
        </div>
      </div>

      <div class="acoes">
        <button type="submit">Enviar solicitação</button>
      </div>
    </form>

    <div id="resultadoSolicitacao" class="resultado"></div>

    <hr />

    <h2>Consultar Protocolo</h2>

    <form id="formConsulta" class="secao">
      <div class="grid">
        <div class="campo">
          <label for="protocolo">Número do protocolo</label>
          <input type="text" id="protocolo" required />
        </div>
      </div>

      <div class="acoes">
        <button type="submit">Consultar</button>
      </div>
    </form>

    <div id="resultadoConsulta" class="resultado"></div>
  </div>

  <script>
    const formSolicitacao = document.getElementById('formSolicitacao');
    const formConsulta = document.getElementById('formConsulta');
    const resultadoSolicitacao = document.getElementById('resultadoSolicitacao');
    const resultadoConsulta = document.getElementById('resultadoConsulta');

    function mostrarResultado(elemento, mensagem, tipo) {
      elemento.style.display = 'block';
      elemento.className = `resultado ${tipo}`;
      elemento.innerHTML = mensagem;
    }

    formSolicitacao.addEventListener('submit', async (e) => {
      e.preventDefault();

      const dados = {
        intencao: document.getElementById('intencao').value,
        nome: document.getElementById('nome').value,
        telefone: document.getElementById('telefone').value,
        chatId: document.getElementById('chatId').value,
        endereco: document.getElementById('endereco').value,
        pontoReferencia: document.getElementById('pontoReferencia').value,
        descricao: document.getElementById('descricao').value,
        opiniao: document.getElementById('opiniao').value
      };

      try {
        const resposta = await fetch('/api/registrar', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(dados)
        });

        const resultado = await resposta.json();

        if (resposta.ok) {
          mostrarResultado(
            resultadoSolicitacao,
            `Solicitação registrada com sucesso.<br><strong>Protocolo:</strong> ${resultado.protocolo || 'Não informado'}`,
            'sucesso'
          );
          formSolicitacao.reset();
        } else {
          mostrarResultado(
            resultadoSolicitacao,
            resultado.erro || 'Não foi possível registrar a solicitação.',
            'erro'
          );
        }
      } catch (erro) {
        mostrarResultado(
          resultadoSolicitacao,
          'Erro ao conectar com o servidor.',
          'erro'
        );
      }
    });

    formConsulta.addEventListener('submit', async (e) => {
      e.preventDefault();

      const protocolo = document.getElementById('protocolo').value;

      try {
        const resposta = await fetch(`/api/consultar/${encodeURIComponent(protocolo)}`);
        const resultado = await resposta.json();

        if (resposta.ok) {
          mostrarResultado(
            resultadoConsulta,
            `
              <strong>Protocolo:</strong> ${resultado.protocolo || protocolo}<br>
              <strong>Status:</strong> ${resultado.status || 'Em análise'}<br>
              <strong>Tipo de solicitação:</strong> ${resultado.intencao || 'Não informado'}<br>
              <strong>Descrição:</strong> ${resultado.descricao || 'Não informada'}
            `,
            'sucesso'
          );
        } else {
          mostrarResultado(
            resultadoConsulta,
            resultado.erro || 'Protocolo não encontrado.',
            'erro'
          );
        }
      } catch (erro) {
        mostrarResultado(
          resultadoConsulta,
          'Erro ao conectar com o servidor.',
          'erro'
        );
      }
    });
  </script>
</body>
</html>
