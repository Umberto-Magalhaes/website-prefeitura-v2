<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Atendimento ao Cidadão</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f3d75;
      font-size: 34px;
    }

    h2 {
      color: #114b8b;
      margin-top: 36px;
      margin-bottom: 20px;
      font-size: 24px;
    }

    p.subtitulo {
      margin-top: -8px;
      margin-bottom: 28px;
      color: #4b5563;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 20px;
    }

    .campo {
      display: flex;
      flex-direction: column;
    }

    .campo-full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
    }

    textarea {
      min-height: 120px;
    }

    .acoes {
      margin-top: 24px;
    }

    button {
      background: #0f62fe;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .resultado {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      display: none;
    }

    .sucesso {
      background: #ecfdf3;
      color: #166534;
    }

    .erro {
      background: #fef2f2;
      color: #991b1b;
    }

    hr {
      margin: 40px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Portal de Atendimento ao Cidadão</h1>

  <p class="subtitulo">
    Registre sua solicitação e acompanhe o andamento através do número de protocolo.
  </p>

  <h2>Registrar Solicitação</h2>

  <form id="formSolicitacao">
    <div class="grid">

      <div class="campo">
        <label>Tipo</label>
        <select id="intencao" required>
          <option value="">Selecione</option>
          <option value="poda_de_arvore">Poda de árvore</option>
          <option value="coleta_de_lixo">Coleta de lixo</option>
        </select>
      </div>

      <div class="campo">
        <label>Nome</label>
        <input type="text" id="nome" required />
      </div>

      <div class="campo campo-full">
        <label>Descrição</label>
        <textarea id="descricao" required></textarea>
      </div>

    </div>

    <div class="acoes">
      <button type="submit">Enviar solicitação</button>
    </div>
  </form>

  <div id="resultadoSolicitacao" class="resultado"></div>

  <hr>

  <h2>Consultar Protocolo</h2>

  <form id="formConsulta">
    <div class="campo">
      <label>Número do protocolo</label>
      <input type="text" id="protocolo" required />
    </div>

    <div class="acoes">
      <button type="submit">Consultar</button>
    </div>
  </form>

  <div id="resultadoConsulta" class="resultado"></div>

</div>

<footer style="text-align:center; margin-top:30px; color:#6b7280;">
  Desenvolvido por CONSTHEC – Soluções Inteligentes para Gestão Pública
</footer>

<script>

function mostrarResultado(el, msg, tipo){
  el.style.display = 'block';
  el.className = 'resultado ' + tipo;
  el.innerHTML = msg;
}

document.getElementById('formSolicitacao').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const dados = {
  origem_canal: "web",
  intencao_identificada_codigo: intencao.value,
  nome_cidadao: nome.value,
  telefone: "81999999999",
  descricao_problema: descricao.value
};

const resposta = await fetch('/api/registros', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(dados)
});

const r = await resposta.json();

if (resposta.ok) {
  mostrarResultado(
    resultadoSolicitacao,
    'Protocolo: ' + r.registro.protocolo,
    'sucesso'
  );
} else {
  mostrarResultado(
    resultadoSolicitacao,
    'Erro ao enviar a solicitação.',
    'erro'
  );
}
});

document.getElementById('formConsulta').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const protocolo = document.getElementById('protocolo').value;

  const res = await fetch('/api/consultar/'+protocolo);
  const r = await res.json();

  if(res.ok){
    mostrarResultado(resultadoConsulta,
      'Status: '+r.status,
      'sucesso'
    );
  } else {
    mostrarResultado(resultadoConsulta,
      'Não encontrado',
      'erro'
    );
  }
});

</script>

</body>
</html>
